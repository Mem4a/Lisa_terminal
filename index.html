<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stamina: WOH Edition v12 (Final Integration)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e6e6e6; 
            --text-color: #000000;
            --border-style: 3px solid #000;
            --error-color: #ff0000;
        }

        @keyframes textGlitch {
            0% { transform: translate(0); text-shadow: none; }
            25% { transform: translate(-2px, 1px); color: #ff0000; }
            50% { transform: translate(2px, -1px); color: #0000ff; }
            75% { transform: translate(-1px, -1px); color: #000000; }
            100% { transform: translate(0); }
        }

        @keyframes panelPulse {
            0% { transform: scale(1); box-shadow: 4px 4px 0px #000; }
            50% { transform: scale(1.02); box-shadow: 6px 6px 0px #000; }
            100% { transform: scale(1); box-shadow: 4px 4px 0px #000; }
        }

        @keyframes ditherBoot {
            from { opacity: 0; transform: translateY(5px); filter: contrast(200%); }
            to { opacity: 1; transform: translateY(0); filter: contrast(100%); }
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        body {
            font-family: 'VT323', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSIyIiBoZWlnaHQ9IjIiIGZpbGw9IiMwMDAwMDAiIGZpbGwtb3BhY2l0eT0iMC4wNSIvPjwvc3ZnPg==');
            padding-bottom: 80px;
        }

        .sound-btn {
            position: fixed; top: 15px; right: 15px;
            background: #000; color: #fff; border: 2px solid #000;
            font-family: 'VT323', monospace; font-size: 16px;
            padding: 5px 10px; cursor: pointer; z-index: 999;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.5); transition: transform 0.05s;
        }

        .frame {
            border: var(--border-style); padding: 15px; width: 100%; max-width: 380px;
            background: #fff; box-shadow: 6px 6px 0px #000; margin-bottom: 20px;
            box-sizing: border-box; position: relative; animation: ditherBoot 0.4s steps(4) ease-out; margin-top: 40px;
        }

        .header-title { font-size: 26px; text-transform: uppercase; border-bottom: var(--border-style); margin-bottom: 15px; text-align: center; padding-bottom: 5px; font-weight: bold; }

        .manga-panel {
            width: 100%; height: 160px; border: var(--border-style);
            margin: 0 auto 15px; background: #000; box-shadow: 4px 4px 0px #000;
            overflow: hidden; animation: panelPulse 4s ease-in-out infinite;
            display: flex; align-items: center; justify-content: center;
            position: relative; 
        }

        .pixel-portrait { width: 100%; height: 100%; display: block; object-fit: cover; image-rendering: pixelated; filter: grayscale(100%) contrast(120%); }

        .speech-bubble {
            position: absolute; background: #fff; color: #000; border: 2px solid #000;
            padding: 8px 12px; font-family: 'VT323', monospace; font-size: 16px;
            line-height: 1.1; max-width: 140px; z-index: 10; box-shadow: 3px 3px 0px #000;
            bottom: 15px; left: 15px;  
        }

        .speech-bubble::after {
            content: ''; position: absolute;
            top: -14px; right: -10px; 
            border-width: 0 0 15px 15px; border-style: solid; border-color: transparent transparent #000 transparent;
        }
        
        .speech-bubble::before {
            content: ''; position: absolute;
            top: -9px; right: -7px;
            border-width: 0 0 10px 10px; border-style: solid; border-color: transparent transparent #fff transparent; z-index: 1;
        }

        button.menu-btn { width: 100%; background: #000; color: #fff; border: 2px solid #000; font-family: 'VT323', monospace; font-size: 22px; padding: 12px; margin: 6px 0; cursor: pointer; text-transform: uppercase; transition: transform 0.05s; position: relative; }
        button.menu-btn:hover { background: #fff; color: #000; animation: textGlitch 0.3s steps(2) infinite; }

        .task-item {
            border: 2px solid #000; padding: 10px; margin-bottom: 10px; background: #fff;
            box-shadow: 3px 3px 0px #000; display: flex; justify-content: space-between; align-items: center;
        }
        .task-name { font-size: 18px; font-weight: bold; line-height: 1.1; }
        .task-xp { font-size: 14px; background: #000; color: #fff; padding: 2px 5px; margin-top: 4px; display: inline-block; }

        .complete-btn {
            background: #fff; color: #000; border: 2px solid #000; font-family: 'VT323', monospace;
            padding: 4px 8px; cursor: pointer; box-shadow: 2px 2px 0px #000;
        }

        .hidden { display: none !important; }
        .blink-text { animation: blink 1.5s steps(2) infinite; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/nnp5ww.mp3" type="audio/mpeg">
    </audio>

    <button id="soundToggleBtn" class="sound-btn hidden" onclick="toggleSound()">[ ♪ ON ]</button>

    <div id="loaderScreen" class="frame" style="margin-top: 15px; cursor: pointer;" onclick="authenticate()">
        <div class="header-title">SYSTEM BOOT</div>
        <p id="loaderStatus" style="text-align:center; font-size: 20px; margin-top: 30px;" class="blink-text">[ НАЖМИ НА ЭКРАН ДЛЯ ЗАПУСКА ]</p>
    </div>

    <div id="accessDeniedScreen" class="frame hidden" style="border-color: red; color: red;">
        <div class="header-title" style="border-color: red;">FATAL ERROR</div>
        <p style="text-align:center; font-size: 22px;">В ДОСТУПЕ ОТКАЗАНО</p>
    </div>

    <div id="mainMenuScreen" class="frame hidden">
        <div class="manga-panel">
            <img src="https://www.stridepr.com/wp-content/uploads/2023/10/WORLD-OF-HORROR-v1.0-Launch-Trailer-0-55-screenshot-360x240.png" alt="WOH Scene" class="pixel-portrait">
            <div id="lisaBubble" class="speech-bubble hidden">...</div>
        </div>
        <div class="header-title">LISA TERMINAL</div>
        <p style="text-align: center; font-size: 18px; font-weight: bold;">Архив открыт, <span id="userName">Семпай</span>.</p>
        <button class="menu-btn" onclick="openScreen('createTaskScreen')">[+] Новое Дело</button>
        <button class="menu-btn" onclick="loadTasks()">[=] Открытые Инциденты</button>
    </div>

    <div id="createTaskScreen" class="frame hidden">
        <div class="header-title">NEW INCIDENT</div>
        <label>Описание дела</label>
        <input type="text" id="taskName" placeholder="Провести ритуал...">
        <label>Сфера расследования</label>
        <select id="taskStat">
            <option value="19ce1807-5ea9-8096-96bd-ce6d6f1c6944">🤓 Сила Клерка</option>
            <option value="19ce1807-5ea9-8033-96d6-e68cba9370fc">🫁 Здоровье</option>
            <option value="19ce1807-5ea9-80b2-89df-f78ce08cbb8a">📻 Музыка</option>
            <option value="19ce1807-5ea9-80ac-80ea-f8a186b375e9">👺 Рисование</option>
            <option value="19ce1807-5ea9-8064-99c1-c360929869e9">👽 3Д</option>
            <option value="19ce1807-5ea9-80f2-9009-fb37181d34af">🕵️‍♂️ Монтаж</option>
            <option value="19ee1807-5ea9-800c-ba78-e54ede7dac9a">🕎 Mentality</option>
        </select>
        <label>Уровень угрозы (XP)</label>
        <select id="taskXP">
            <option value="15">15 XP (Легко)</option>
            <option value="30">30 XP (Опасно)</option>
            <option value="50">50 XP (Смертельно)</option>
        </select>
        <label>Дата инцидента</label>
        <input type="date" id="taskDate">
        <button id="browserSubmitBtn" class="menu-btn" style="margin-top: 20px; background: #fff; color: #000;" onclick="submitTask()">[ ЗАНЕСТИ В АРХИВ ]</button>
    </div>

    <div id="viewTasksScreen" class="frame hidden">
        <div class="header-title">OPEN INVESTIGATIONS</div>
        <div id="taskListContent"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const AUTH_WEBHOOK_URL = 'https://n8n.nevn8n8amocrm.online/webhook/b0607fcb-775f-466e-8f2d-cc3b81fb632e'; 
        const N8N_CREATE_TASK_URL = 'https://n8n.nevn8n8amocrm.online/webhook/ba753654-0bcf-44b6-bd2f-299a6a5b389f';
        const N8N_GET_TASKS_URL = 'https://n8n.nevn8n8amocrm.online/webhook/stamina-get-tasks';
        const N8N_COMPLETE_TASK_URL = 'https://n8n.nevn8n8amocrm.online/webhook/stamina-complete-task';

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('taskDate').value = today;

        let typeWriterTimeout;

        function lisaSpeak(text) {
            const bubble = document.getElementById('lisaBubble');
            bubble.classList.remove('hidden');
            bubble.innerText = '';
            clearTimeout(typeWriterTimeout);
            let i = 0;
            function typeWriter() {
                if (i < text.length) {
                    bubble.innerHTML += text.charAt(i);
                    i++;
                    typeWriterTimeout = setTimeout(typeWriter, 35);
                }
            }
            typeWriter();
        }

        function toggleSound() {
            const audio = document.getElementById('bgMusic');
            audio.muted = !audio.muted;
            document.getElementById('soundToggleBtn').innerText = audio.muted ? '[ ♪ OFF ]' : '[ ♪ ON ]';
        }

        async function authenticate() {
            const audio = document.getElementById('bgMusic');
            audio.play().catch(e => {});
            
            const statusText = document.getElementById('loaderStatus');
            statusText.innerText = "СВЕРКА ПЕЧАТЕЙ...";
            statusText.style.animation = "textGlitch 0.2s infinite";

            let tgId = tg.initDataUnsafe?.user?.id || 1211686949; 

            try {
                const response = await fetch(AUTH_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tg_id: tgId })
                });
                const data = await response.json();
                if (response.ok && data.status === 'ok') {
                    document.getElementById('userName').innerText = data.name || "Семпай";
                    openScreen('mainMenuScreen');
                    document.getElementById('soundToggleBtn').classList.remove('hidden');
                    setTimeout(() => lisaSpeak(`Рада видеть вас живым, ${data.name || "Семпай"}.`), 500);
                } else {
                    openScreen('accessDeniedScreen');
                }
            } catch (e) {
                statusText.innerText = "[ ОШИБКА СЕРВЕРА ]";
            }
        }

        function openScreen(screenId) {
            document.querySelectorAll('.frame').forEach(el => el.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            document.getElementById('lisaBubble').classList.add('hidden');
            
            if (screenId !== 'mainMenuScreen') {
                tg.BackButton.show();
                tg.BackButton.onClick(() => openScreen('mainMenuScreen'));
            } else {
                tg.BackButton.hide();
            }

            if (screenId === 'createTaskScreen' && tg.initDataUnsafe?.user) {
                tg.MainButton.setText("ЗАНЕСТИ В АРХИВ");
                tg.MainButton.show();
                tg.MainButton.onClick(submitTask);
            } else {
                tg.MainButton.hide();
            }
        }

        async function submitTask() {
            const payload = {
                task_name: document.getElementById('taskName').value,
                stat_id: document.getElementById('taskStat').value,
                xp: parseInt(document.getElementById('taskXP').value),
                date: document.getElementById('taskDate').value
            };
            if (!payload.task_name) return;
            tg.MainButton.showProgress();
            try {
                await fetch(N8N_CREATE_TASK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                document.getElementById('taskName').value = '';
                openScreen('mainMenuScreen');
                setTimeout(() => lisaSpeak("Инцидент зафиксирован во тьме..."), 500);
            } finally {
                tg.MainButton.hideProgress();
            }
        }

        async function loadTasks() {
            openScreen('viewTasksScreen');
            const container = document.getElementById('taskListContent');
            container.innerHTML = '<p style="text-align:center;" class="blink-text">ЧТЕНИЕ СВИТКОВ...</p>';
            try {
                const response = await fetch(N8N_GET_TASKS_URL);
                const tasks = await response.json();
                container.innerHTML = tasks.length ? '' : '<p style="text-align:center;">ИНЦИДЕНТОВ НЕТ. ТИШИНА.</p>';
                tasks.forEach(task => {
                    container.innerHTML += `
                        <div class="task-item" id="task-${task.id}">
                            <div><div class="task-name">${task.name}</div><div class="task-xp">${task.xp} УГРОЗА</div></div>
                            <button class="complete-btn" onclick="completeTask('${task.id}', this)">[ ИЗГНАТЬ ]</button>
                        </div>`;
                });
            } catch (e) { container.innerHTML = '<p>ОШИБКА СВЯЗИ.</p>'; }
        }

        async function completeTask(taskId, btn) {
            btn.innerText = '[ ... ]';
            try {
                await fetch(N8N_COMPLETE_TASK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: taskId })
                });
                document.getElementById(`task-${taskId}`).remove();
                lisaSpeak("Инцидент исчерпан. Зло отступило.");
            } catch (e) { btn.innerText = '[ ОШИБКА ]'; }
        }
    </script>
</body>
</html>
