<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stamina: WOH Edition v18 (Performance Fix)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #e6e6e6; --text-color: #000000; --border-style: 3px solid #000; --error-color: #ff0000; }
        @keyframes textGlitch { 0% { transform: translate(0); text-shadow: none; } 25% { transform: translate(-2px, 1px); color: #ff0000; } 50% { transform: translate(2px, -1px); color: #0000ff; } 75% { transform: translate(-1px, -1px); color: #000000; } 100% { transform: translate(0); } }
        @keyframes panelPulse { 0% { transform: scale(1); box-shadow: 4px 4px 0px #000; } 50% { transform: scale(1.02); box-shadow: 6px 6px 0px #000; } 100% { transform: scale(1); box-shadow: 4px 4px 0px #000; } }
        @keyframes ditherBoot { from { opacity: 0; transform: translateY(5px); filter: contrast(200%); } to { opacity: 1; transform: translateY(0); filter: contrast(100%); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        body { font-family: 'VT323', monospace; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSIyIiBoZWlnaHQ9IjIiIGZpbGw9IiMwMDAwMDAiIGZpbGwtb3BhY2l0eT0iMC4wNSIvPjwvc3ZnPg=='); padding-bottom: 80px; }
        .sound-btn { position: fixed; top: 15px; right: 15px; background: #000; color: #fff; border: 2px solid #000; font-family: 'VT323', monospace; font-size: 16px; padding: 5px 10px; cursor: pointer; z-index: 999; box-shadow: 3px 3px 0px rgba(0,0,0,0.5); transition: transform 0.05s; }
        .sound-btn:active { transform: translate(2px, 2px); box-shadow: none; }
        .frame { border: var(--border-style); padding: 15px; width: 100%; max-width: 380px; background: #fff; box-shadow: 6px 6px 0px #000; margin-bottom: 20px; box-sizing: border-box; position: relative; animation: ditherBoot 0.4s steps(4) ease-out; margin-top: 40px; }
        .header-title { font-size: 26px; text-transform: uppercase; border-bottom: var(--border-style); margin-bottom: 15px; text-align: center; padding-bottom: 5px; font-weight: bold; }
        .manga-panel { width: 100%; height: 160px; border: var(--border-style); margin: 0 auto 15px; background: #000; box-shadow: 4px 4px 0px #000; overflow: hidden; animation: panelPulse 4s ease-in-out infinite; display: flex; align-items: center; justify-content: center; position: relative; }
        .pixel-portrait { width: 100%; height: 100%; display: block; object-fit: cover; image-rendering: pixelated; filter: grayscale(100%) contrast(120%); }
        .speech-bubble { position: absolute; background: #fff; color: #000; border: 2px solid #000; padding: 8px 12px; font-family: 'VT323', monospace; font-size: 16px; line-height: 1.1; max-width: 140px; z-index: 10; box-shadow: 3px 3px 0px #000; bottom: 15px; left: 15px; }
        .speech-bubble::after { content: ''; position: absolute; top: -14px; right: -10px; border-width: 0 0 15px 15px; border-style: solid; border-color: transparent transparent #000 transparent; }
        .speech-bubble::before { content: ''; position: absolute; top: -9px; right: -7px; border-width: 0 0 10px 10px; border-style: solid; border-color: transparent transparent #fff transparent; z-index: 1; }
        button.menu-btn { width: 100%; background: #000; color: #fff; border: 2px solid #000; font-family: 'VT323', monospace; font-size: 22px; padding: 12px; margin: 6px 0; cursor: pointer; text-transform: uppercase; transition: all 0.1s; position: relative; box-shadow: 4px 4px 0px rgba(0,0,0,0.3); }
        button.menu-btn:active { background: #fff !important; color: #000 !important; transform: translate(3px, 3px); box-shadow: none; animation: textGlitch 0.2s steps(2) infinite; }
        button.small-btn { font-size: 16px; padding: 6px; margin-top: 10px; background: #fff; color: #000; border: 2px dashed #000; box-shadow: 2px 2px 0px rgba(0,0,0,0.3); }
        button.small-btn:active { background: #000; color: #fff; transform: translate(2px, 2px); box-shadow: none; }
        .task-item { border: 2px solid #000; padding: 10px; margin-bottom: 10px; background: #fff; box-shadow: 3px 3px 0px #000; display: flex; justify-content: space-between; align-items: center; }
        .task-name { font-size: 18px; font-weight: bold; line-height: 1.1; }
        .task-xp { font-size: 14px; background: #000; color: #fff; padding: 2px 5px; margin-top: 4px; display: inline-block; }
        .complete-btn { background: #fff; color: #000; border: 2px solid #000; font-family: 'VT323', monospace; padding: 4px 8px; cursor: pointer; box-shadow: 2px 2px 0px #000; transition: transform 0.1s; }
        .complete-btn:active { transform: translate(2px, 2px); box-shadow: none; background: #000; color: #fff; }
        .stat-container { margin-bottom: 15px; }
        .stat-header { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; margin-bottom: 4px; }
        .stat-bar-bg { width: 100%; height: 16px; border: 2px solid #000; background: #fff; position: relative; box-sizing: border-box; }
        .stat-bar-fill { height: 100%; background: #000; transition: width 0.5s ease-out; }
        .stat-level { font-size: 14px; color: #666; }
        .title-block { border: 2px dashed #000; padding: 10px; margin-bottom: 20px; text-align: center; background: #f9f9f9; }
        .title-label { font-size: 16px; color: #666; }
        .title-name { font-size: 24px; font-weight: bold; text-transform: uppercase; margin-top: 5px; animation: textGlitch 3s infinite; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 18px; color: #333; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        input[type="text"], input[type="date"], select { width: 100%; box-sizing: border-box; border: 2px solid #000; padding: 10px; font-family: 'VT323', monospace; font-size: 20px; background: #fff; color: #000; outline: none; -webkit-appearance: none; appearance: none; border-radius: 0; box-shadow: 2px 2px 0px #000; transition: all 0.1s; }
        input[type="text"]:focus, input[type="date"]:focus, select:focus { border-color: var(--error-color); box-shadow: 4px 4px 0px var(--error-color); background: #fff; color: #000; }
        input[type="text"]::placeholder { color: #aaa; }
        .select-wrapper { position: relative; }
        .select-wrapper::after { content: '▼'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; font-size: 14px; color: #000; transition: color 0.1s; }
        .select-wrapper:focus-within::after { color: var(--error-color); }
        .xp-selector { display: flex; gap: 8px; }
        .xp-selector input[type="radio"] { display: none; }
        .xp-selector label { flex: 1; border: 2px solid #000; text-align: center; padding: 8px 0; font-size: 18px; cursor: pointer; text-transform: uppercase; background: #fff; color: #000; box-shadow: 2px 2px 0px #000; font-weight: bold; transition: 0.1s; }
        .xp-selector input[type="radio"]:checked + label { background: #000; color: #fff; box-shadow: inset 2px 2px 0px rgba(0,0,0,0.8); transform: translate(2px, 2px); }
        .codex-section { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px dotted #ccc; }
        .codex-h { font-size: 18px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .codex-p { font-size: 16px; line-height: 1.2; margin: 0 0 5px 0; }
        .highlight { background: #000; color: #fff; padding: 0 4px; }
        .hidden { display: none !important; }
        .blink-text { animation: blink 1.5s steps(2) infinite; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/nnp5ww.mp3" type="audio/mpeg">
    </audio>

    <button id="soundToggleBtn" class="sound-btn hidden" onclick="toggleSound()">[ ♪ ON ]</button>

    <div id="loaderScreen" class="frame" style="margin-top: 15px; cursor: pointer;" onclick="authenticate()">
        <div class="header-title">SYSTEM BOOT</div>
        <p id="loaderStatus" style="text-align:center; font-size: 20px; margin-top: 30px;" class="blink-text">[ НАЖМИ НА ЭКРАН ДЛЯ ЗАПУСКА ]</p>
    </div>

    <div id="errorScreen" class="frame hidden" style="border-color: var(--error-color); color: var(--error-color);">
        <div class="header-title" style="border-color: var(--error-color);">FATAL ERROR</div>
        <p id="errorMsgText" style="text-align:center; font-size: 20px; margin-bottom: 20px;">СВЯЗЬ ПРЕРВАНА</p>
        <button class="menu-btn" style="background: var(--error-color); border-color: var(--error-color);" onclick="retryLastAction()">[ ПОВТОРИТЬ ПОПЫТКУ ]</button>
    </div>

    <div id="mainMenuScreen" class="frame hidden">
        <div class="manga-panel">
            <img src="https://www.stridepr.com/wp-content/uploads/2023/10/WORLD-OF-HORROR-v1.0-Launch-Trailer-0-55-screenshot-360x240.png" alt="WOH Scene" class="pixel-portrait">
            <div id="lisaBubble" class="speech-bubble hidden">...</div>
        </div>
        <div class="header-title">LISA TERMINAL</div>
        <p style="text-align: center; font-size: 18px; font-weight: bold;">Архив открыт, <span id="userName">Семпай</span>.</p>
        <button class="menu-btn" onclick="openScreen('createTaskScreen')">[+] Новое Дело</button>
        <button class="menu-btn" onclick="loadTasks()">[=] Открытые Инциденты</button>
        <button class="menu-btn" style="background:#fff; color:#000;" onclick="loadStats()">[*] Состояние Разума</button>
    </div>

    <div id="createTaskScreen" class="frame hidden">
        <div class="header-title">NEW INCIDENT</div>
        <div class="input-group">
            <label>> ОПИСАНИЕ ИНЦИДЕНТА</label>
            <input type="text" id="taskName" placeholder="Изгнать демона прокрастинации..." autocomplete="off">
        </div>
        <div class="input-group">
            <label>> СФЕРА РАССЛЕДОВАНИЯ</label>
            <div class="select-wrapper">
                <select id="taskStat">
                    <option value="">Загрузка сфер...</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>> УРОВЕНЬ УГРОЗЫ (XP)</label>
            <div class="xp-selector">
                <input type="radio" id="xp15" name="taskXP" value="15" checked>
                <label for="xp15">15 XP</label>
                <input type="radio" id="xp30" name="taskXP" value="30">
                <label for="xp30">30 XP</label>
                <input type="radio" id="xp50" name="taskXP" value="50">
                <label for="xp50">50 XP</label>
            </div>
        </div>
        <div class="input-group">
            <label>> ДАТА КАТАСТРОФЫ</label>
            <input type="date" id="taskDate">
        </div>
        <button id="browserSubmitBtn" class="menu-btn" style="margin-top: 25px; background: #000; color: #fff;" onclick="submitTask()">[ ЗАНЕСТИ В АРХИВ ]</button>
    </div>

    <div id="viewTasksScreen" class="frame hidden">
        <div class="header-title">INVESTIGATIONS</div>
        <div id="taskListContent"></div>
    </div>

    <div id="statsScreen" class="frame hidden">
        <div class="header-title">VITALS & SKILLS</div>
        <div class="title-block" id="titleBlockContainer" style="display: none;">
            <div class="title-label">Ваш текущий профиль:</div>
            <div class="title-name" id="playerTitle">АНАЛИЗ...</div>
            <button class="menu-btn small-btn" onclick="openCodex()">[ РАСШИФРОВАТЬ ГЕНОМ ]</button>
        </div>
        <div id="statsListContent"></div>
    </div>

    <div id="codexScreen" class="frame hidden">
        <div class="header-title">GENOME CODEX</div>
        <div id="codexContent"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const AUTH_WEBHOOK_URL = 'https://n8n.nevn8n8amocrm.online/webhook/ba753654-0bcf-44b6-bd2f-299a6a5b389f'; 
        const N8N_CREATE_TASK_URL = 'https://n8n.nevn8n8amocrm.online/webhook/280b0523-75cd-4075-8368-2c63ab9bc3ae';
        const N8N_GET_TASKS_URL = 'https://n8n.nevn8n8amocrm.online/webhook/stamina-get-tasks';
        const N8N_COMPLETE_TASK_URL = 'https://n8n.nevn8n8amocrm.online/webhook/stamina-complete-task';
        const N8N_GET_STATS_URL = 'https://n8n.nevn8n8amocrm.online/webhook/stamina-get-stats';

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('taskDate').value = today;

        let typeWriterTimeout;
        let globalBackendData = null; 
        let backTarget = 'mainMenuScreen'; 
        let lastFailedFunction = null; 

        tg.BackButton.onClick(() => {
            if(backTarget === 'statsScreen') loadStats();
            else openScreen(backTarget);
        });

        // ОПТИМИЗАЦИЯ 1: ИЗБЕГАЕМ ИЗБИЕНИЯ DOM В АНИМАЦИИ ТЕКСТА
        function lisaSpeak(text) {
            const bubble = document.getElementById('lisaBubble');
            bubble.classList.remove('hidden');
            clearTimeout(typeWriterTimeout);
            let i = 0;
            function typeWriter() {
                if (i <= text.length) {
                    bubble.innerText = text.slice(0, i); // Быстрая вставка текста вместо innerHTML +=
                    i++;
                    typeWriterTimeout = setTimeout(typeWriter, 25);
                }
            }
            typeWriter();
        }

        function toggleSound() {
            const audio = document.getElementById('bgMusic');
            audio.muted = !audio.muted;
            document.getElementById('soundToggleBtn').innerText = audio.muted ? '[ ♪ OFF ]' : '[ ♪ ON ]';
        }

        function showError(msg, retryFunc) {
            lastFailedFunction = retryFunc;
            document.getElementById('errorMsgText').innerHTML = msg;
            openScreen('errorScreen', 'mainMenuScreen');
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }

        function retryLastAction() {
            if (lastFailedFunction) lastFailedFunction();
            else openScreen('mainMenuScreen');
        }

        async function authenticate() {
            const audio = document.getElementById('bgMusic');
            try { await audio.play(); } catch (e) { console.warn("Autoplay blocked by browser"); }
            
            const statusText = document.getElementById('loaderStatus');
            statusText.innerText = "РАСШИФРОВКА ПЕЧАТЕЙ...";

            // 1. БЕРЕМ ЗАШИФРОВАННЫЕ ДАННЫЕ ОТ ТЕЛЕГРАМ
            const initData = tg.initData; 

            // Если открыли не в Телеграме (в обычном браузере), сразу шлем лесом
            if (!initData) {
                showError("КРИТИЧЕСКИЙ СБОЙ<br>Доступ только через Telegram", authenticate);
                return;
            }

            try {
                // Предзагрузка категорий для выпадающего списка
                fetch(`${N8N_GET_STATS_URL}?t=${Date.now()}`)
                    .then(res => res.json())
                    .then(data => {
                        if(data.categories) {
                            const select = document.getElementById('taskStat');
                            let optionsHtml = '';
                            data.categories.forEach(cat => {
                                optionsHtml += `<option value="${cat.id}">${cat.name}</option>`;
                            });
                            select.innerHTML = optionsHtml;
                        }
                    }).catch(e => console.error("Failed to load categories"));

                // 2. ОТПРАВЛЯЕМ ШИФР НА СЕРВЕР (АВТОРИЗАЦИЯ)
                const response = await fetch(AUTH_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: initData }) 
                });
                
                if (!response.ok) throw new Error("HTTP Status " + response.status);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    document.getElementById('userName').innerText = data.name || "Семпай";
                    openScreen('mainMenuScreen');
                    document.getElementById('soundToggleBtn').classList.remove('hidden');
                    setTimeout(() => lisaSpeak(`Печать подтверждена. Добро пожаловать, ${data.name || "Семпай"}.`), 500);
                } else {
                    // Если хакер прислал неверный шифр
                    showError("В ДОСТУПЕ ОТКАЗАНО<br>Фальшивая печать.", authenticate);
                }
            } catch (e) { 
                showError("ОШИБКА СВЯЗИ С СЕРВЕРОМ<br><span style='font-size:14px;'>" + e.message + "</span>", authenticate); 
            }
        }

        function openScreen(screenId, target = 'mainMenuScreen') {
            backTarget = target;
            document.querySelectorAll('.frame').forEach(el => el.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            document.getElementById('lisaBubble').classList.add('hidden');
            
            if (screenId !== 'mainMenuScreen' && screenId !== 'loaderScreen' && screenId !== 'errorScreen') {
                tg.BackButton.show();
            } else {
                tg.BackButton.hide();
            }

            if (screenId === 'createTaskScreen' && tg.initDataUnsafe?.user) {
                tg.MainButton.setText("ЗАНЕСТИ В АРХИВ");
                tg.MainButton.show();
                tg.MainButton.onClick(submitTask);
            } else {
                tg.MainButton.hide();
            }
        }

        async function submitTask() {
            const selectedXp = document.querySelector('input[name="taskXP"]:checked').value;
            const payload = {
                task_name: document.getElementById('taskName').value,
                stat_id: document.getElementById('taskStat').value,
                xp: parseInt(selectedXp),
                date: document.getElementById('taskDate').value
            };
            if (!payload.task_name) return;
            tg.MainButton.showProgress();
            try {
                const response = await fetch(N8N_CREATE_TASK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error("Server rejected task");
                document.getElementById('taskName').value = '';
                openScreen('mainMenuScreen');
                setTimeout(() => lisaSpeak("Инцидент зафиксирован во тьме..."), 500);
            } catch (e) {
                tg.MainButton.hideProgress();
                showError("СБОЙ ЗАПИСИ<br>Инцидент не был сохранен.", submitTask);
            } finally { tg.MainButton.hideProgress(); }
        }

        async function loadTasks() {
            openScreen('viewTasksScreen');
            const container = document.getElementById('taskListContent');
            container.innerHTML = '<p style="text-align:center;" class="blink-text">ЧТЕНИЕ СВИТКОВ...</p>';
            try {
                const response = await fetch(`${N8N_GET_TASKS_URL}?t=${Date.now()}`);
                if (!response.ok) throw new Error("Bad response");
                const rawData = await response.json();
                const tasks = Array.isArray(rawData) ? rawData : (rawData.tasks || []);
                
                if (tasks.length === 0) {
                    container.innerHTML = '<p style="text-align:center; padding: 20px;">ИНЦИДЕНТОВ НЕТ. ТИШИНА.</p>';
                    return;
                }

                // ОПТИМИЗАЦИЯ 3: Собираем список задач в строку, затем 1 раз вставляем в DOM
                let htmlBuffer = '';
                tasks.forEach(task => {
                    htmlBuffer += `
                        <div class="task-item" id="task-${task.id}">
                            <div style="flex-grow: 1; padding-right: 10px;">
                                <div class="task-name">${task.name}</div>
                                <div class="task-xp">${task.xp} УГРОЗА</div>
                            </div>
                            <button class="complete-btn" onclick="completeTask('${task.id}', this)">[ ИЗГНАТЬ ]</button>
                        </div>`;
                });
                container.innerHTML = htmlBuffer;

            } catch (e) { showError("ОШИБКА АРХИВА<br>Не удалось прочесть свитки.", loadTasks); }
        }

        async function completeTask(taskId, btn) {
            btn.innerText = '[ ... ]';
            const taskElement = document.getElementById(`task-${taskId}`);
            if (taskElement) taskElement.style.animation = 'textGlitch 0.2s infinite';

            try {
                const response = await fetch(N8N_COMPLETE_TASK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: taskId })
                });
                if (!response.ok) throw new Error("Failed");
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

                if (taskElement) {
                    taskElement.style.cssText = "border: 2px dashed #000; padding: 15px; margin-bottom: 10px; text-align: center; background: #000; color: #fff; animation: textGlitch 0.3s infinite; box-shadow: none;";
                    taskElement.innerHTML = "<b style='font-size: 18px;'>ИНЦИДЕНТ ИСЧЕРПАН.<br>ЗЛО ОТСТУПИЛО.</b>";
                    setTimeout(() => {
                        taskElement.style.transition = "all 0.5s ease";
                        taskElement.style.opacity = "0";
                        taskElement.style.transform = "scale(0.9)";
                        setTimeout(() => taskElement.remove(), 500); 
                    }, 2000);
                }
            } catch (e) { 
                btn.innerText = '[ ОШИБКА ]'; 
                if (taskElement) taskElement.style.animation = 'none';
                if (tg.showAlert) tg.showAlert("Ошибка изгнания: тьма не отпускает.");
            }
        }

        async function loadStats() {
            openScreen('statsScreen');
            const container = document.getElementById('statsListContent');
            const titleBlock = document.getElementById('titleBlockContainer');
            
            container.innerHTML = '<p style="text-align:center;" class="blink-text">СВЯЗЬ С СЕРВЕРОМ АНАЛИЗА...</p>';
            titleBlock.style.display = 'none';

            try {
                const response = await fetch(`${N8N_GET_STATS_URL}?t=${Date.now()}`);
                if (!response.ok) throw new Error("Stats Server Error");
                globalBackendData = await response.json(); 
                
                const stats = globalBackendData.stats || [];

                if(stats.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">Данные о сущности не найдены.</p>';
                    return;
                }

                if (globalBackendData.profile) {
                    document.getElementById('playerTitle').innerText = `[ ${globalBackendData.profile.title} ]`;
                    titleBlock.style.display = 'block';
                }

                // ОПТИМИЗАЦИЯ 4: Собираем список характеристик в память, затем вставляем в DOM
                let htmlBuffer = '';
                stats.forEach(stat => {
                    htmlBuffer += `
                        <div class="stat-container">
                            <div class="stat-header">
                                <span>${stat.name} <span class="stat-level">LVL ${stat.level}</span></span>
                                <span style="font-size: 16px;">${stat.current_xp} / ${stat.required_xp} XP</span>
                            </div>
                            <div class="stat-bar-bg">
                                <div class="stat-bar-fill" style="width: ${stat.percent}%;"></div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = htmlBuffer;

            } catch (e) { showError("СБОЙ БИОМЕТРИИ<br>Сервер не отвечает.", loadStats); }
        }

        function openCodex() {
            openScreen('codexScreen', 'statsScreen');
            const container = document.getElementById('codexContent');
            if (!globalBackendData || !globalBackendData.profile) {
                container.innerHTML = '<p>Нет данных для анализа.</p>'; return;
            }

            const prof = globalBackendData.profile;
            
            let html = `
                <div class="codex-section">
                    <div class="codex-h">ДОМИНАНТА РАЗУМА</div>
                    <p class="codex-p">Ваш основной вектор развития — <span class="highlight">${prof.dominanta_name}</span> (Уровень ${prof.dominanta_lvl}). Это диктует первородную форму.</p>
                </div>
            `;

            if (prof.is_hybrid) {
                html += `
                <div class="codex-section">
                    <div class="codex-h">МУТАЦИЯ: АКТИВНА</div>
                    <p class="codex-p">Влияние <span class="highlight">${prof.mutation_name}</span> достаточно велико, чтобы запустить синтез. Ваша сущность эволюционировала в гибрид.</p>
                </div>`;
            } else {
                html += `
                <div class="codex-section">
                    <div class="codex-h">МУТАЦИЯ: СПЯЩИЙ ГЕН</div>
                    <p class="codex-p">Ваши второстепенные навыки слишком слабы, чтобы образовать синтез с доминантой (нужно минимум 65% опыта от основы).</p>
                </div>`;
            }
            container.innerHTML = html;
        }
    </script>
</body>
</html>
