<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stamina: WOH Edition v15 (Codex)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e6e6e6; 
            --text-color: #000000;
            --border-style: 3px solid #000;
            --error-color: #ff0000;
        }

        @keyframes textGlitch {
            0% { transform: translate(0); text-shadow: none; }
            25% { transform: translate(-2px, 1px); color: #ff0000; }
            50% { transform: translate(2px, -1px); color: #0000ff; }
            75% { transform: translate(-1px, -1px); color: #000000; }
            100% { transform: translate(0); }
        }

        @keyframes panelPulse {
            0% { transform: scale(1); box-shadow: 4px 4px 0px #000; }
            50% { transform: scale(1.02); box-shadow: 6px 6px 0px #000; }
            100% { transform: scale(1); box-shadow: 4px 4px 0px #000; }
        }

        @keyframes ditherBoot {
            from { opacity: 0; transform: translateY(5px); filter: contrast(200%); }
            to { opacity: 1; transform: translateY(0); filter: contrast(100%); }
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        body {
            font-family: 'VT323', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSIyIiBoZWlnaHQ9IjIiIGZpbGw9IiMwMDAwMDAiIGZpbGwtb3BhY2l0eT0iMC4wNSIvPjwvc3ZnPg==');
            padding-bottom: 80px;
        }

        .sound-btn {
            position: fixed; top: 15px; right: 15px;
            background: #000; color: #fff; border: 2px solid #000;
            font-family: 'VT323', monospace; font-size: 16px;
            padding: 5px 10px; cursor: pointer; z-index: 999;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.5); transition: transform 0.05s;
        }

        .frame {
            border: var(--border-style); padding: 15px; width: 100%; max-width: 380px;
            background: #fff; box-shadow: 6px 6px 0px #000; margin-bottom: 20px;
            box-sizing: border-box; position: relative; animation: ditherBoot 0.4s steps(4) ease-out; margin-top: 40px;
        }

        .header-title { font-size: 26px; text-transform: uppercase; border-bottom: var(--border-style); margin-bottom: 15px; text-align: center; padding-bottom: 5px; font-weight: bold; }

        .manga-panel {
            width: 100%; height: 160px; border: var(--border-style);
            margin: 0 auto 15px; background: #000; box-shadow: 4px 4px 0px #000;
            overflow: hidden; animation: panelPulse 4s ease-in-out infinite;
            display: flex; align-items: center; justify-content: center;
            position: relative; 
        }

        .pixel-portrait { width: 100%; height: 100%; display: block; object-fit: cover; image-rendering: pixelated; filter: grayscale(100%) contrast(120%); }

        .speech-bubble {
            position: absolute; background: #fff; color: #000; border: 2px solid #000;
            padding: 8px 12px; font-family: 'VT323', monospace; font-size: 16px;
            line-height: 1.1; max-width: 140px; z-index: 10; box-shadow: 3px 3px 0px #000;
            bottom: 15px; left: 15px;  
        }

        .speech-bubble::after { content: ''; position: absolute; top: -14px; right: -10px; border-width: 0 0 15px 15px; border-style: solid; border-color: transparent transparent #000 transparent; }
        .speech-bubble::before { content: ''; position: absolute; top: -9px; right: -7px; border-width: 0 0 10px 10px; border-style: solid; border-color: transparent transparent #fff transparent; z-index: 1; }

        button.menu-btn { width: 100%; background: #000; color: #fff; border: 2px solid #000; font-family: 'VT323', monospace; font-size: 22px; padding: 12px; margin: 6px 0; cursor: pointer; text-transform: uppercase; transition: transform 0.05s; position: relative; }
        button.menu-btn:hover { background: #fff; color: #000; animation: textGlitch 0.3s steps(2) infinite; }
        button.small-btn { font-size: 16px; padding: 6px; margin-top: 10px; background: #fff; color: #000; border: 2px dashed #000; }
        button.small-btn:hover { background: #000; color: #fff; }

        .task-item { border: 2px solid #000; padding: 10px; margin-bottom: 10px; background: #fff; box-shadow: 3px 3px 0px #000; display: flex; justify-content: space-between; align-items: center; }
        .task-name { font-size: 18px; font-weight: bold; line-height: 1.1; }
        .task-xp { font-size: 14px; background: #000; color: #fff; padding: 2px 5px; margin-top: 4px; display: inline-block; }
        .complete-btn { background: #fff; color: #000; border: 2px solid #000; font-family: 'VT323', monospace; padding: 4px 8px; cursor: pointer; box-shadow: 2px 2px 0px #000; }

        .stat-container { margin-bottom: 15px; }
        .stat-header { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; margin-bottom: 4px; }
        .stat-bar-bg { width: 100%; height: 16px; border: 2px solid #000; background: #fff; position: relative; box-sizing: border-box; }
        .stat-bar-fill { height: 100%; background: #000; transition: width 0.5s ease-out; }
        .stat-level { font-size: 14px; color: #666; }

        .title-block { border: 2px dashed #000; padding: 10px; margin-bottom: 20px; text-align: center; background: #f9f9f9; }
        .title-label { font-size: 16px; color: #666; }
        .title-name { font-size: 24px; font-weight: bold; text-transform: uppercase; margin-top: 5px; animation: textGlitch 3s infinite; }

        /* СТИЛИ ДЛЯ КОДЕКСА */
        .codex-section { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px dotted #ccc; }
        .codex-h { font-size: 18px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .codex-p { font-size: 16px; line-height: 1.2; margin: 0 0 5px 0; }
        .highlight { background: #000; color: #fff; padding: 0 4px; }

        .hidden { display: none !important; }
        .blink-text { animation: blink 1.5s steps(2) infinite; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/nnp5ww.mp3" type="audio/mpeg">
    </audio>

    <button id="soundToggleBtn" class="sound-btn hidden" onclick="toggleSound()">[ ♪ ON ]</button>

    <div id="loaderScreen" class="frame" style="margin-top: 15px; cursor: pointer;" onclick="authenticate()">
        <div class="header-title">SYSTEM BOOT</div>
        <p id="loaderStatus" style="text-align:center; font-size: 20px; margin-top: 30px;" class="blink-text">[ НАЖМИ НА ЭКРАН ДЛЯ ЗАПУСКА ]</p>
    </div>

    <div id="accessDeniedScreen" class="frame hidden" style="border-color: red; color: red;">
        <div class="header-title" style="border-color: red;">FATAL ERROR</div>
        <p style="text-align:center; font-size: 22px;">В ДОСТУПЕ ОТКАЗАНО</p>
    </div>

    <div id="mainMenuScreen" class="frame hidden">
        <div class="manga-panel">
            <img src="https://www.stridepr.com/wp-content/uploads/2023/10/WORLD-OF-HORROR-v1.0-Launch-Trailer-0-55-screenshot-360x240.png" alt="WOH Scene" class="pixel-portrait">
            <div id="lisaBubble" class="speech-bubble hidden">...</div>
        </div>
        <div class="header-title">LISA TERMINAL</div>
        <p style="text-align: center; font-size: 18px; font-weight: bold;">Архив открыт, <span id="userName">Семпай</span>.</p>
        
        <button class="menu-btn" onclick="openScreen('createTaskScreen')">[+] Новое Дело</button>
        <button class="menu-btn" onclick="loadTasks()">[=] Открытые Инциденты</button>
        <button class="menu-btn" style="background:#fff; color:#000;" onclick="loadStats()">[*] Состояние Разума</button>
    </div>

    <div id="createTaskScreen" class="frame hidden">
        <div class="header-title">NEW INCIDENT</div>
        <label>Описание дела</label>
        <input type="text" id="taskName" placeholder="Провести ритуал...">
        <label>Сфера расследования</label>
        <select id="taskStat">
            <option value="19ce1807-5ea9-8096-96bd-ce6d6f1c6944">🤓 Сила Клерка</option>
            <option value="19ce1807-5ea9-8033-96d6-e68cba9370fc">🫁 Здоровье</option>
            <option value="19ce1807-5ea9-80b2-89df-f78ce08cbb8a">📻 Музыка</option>
            <option value="19ce1807-5ea9-80ac-80ea-f8a186b375e9">👺 Рисование</option>
            <option value="19ce1807-5ea9-8064-99c1-c360929869e9">👽 3Д</option>
            <option value="19ce1807-5ea9-80f2-9009-fb37181d34af">🕵️‍♂️ Монтаж</option>
            <option value="19ee1807-5ea9-800c-ba78-e54ede7dac9a">🕎 Mentality</option>
        </select>
        <label>Уровень угрозы (XP)</label>
        <select id="taskXP">
            <option value="15">15 XP (Легко)</option>
            <option value="30">30 XP (Опасно)</option>
            <option value="50">50 XP (Смертельно)</option>
        </select>
        <label>Дата инцидента</label>
        <input type="date" id="taskDate">
        <button id="browserSubmitBtn" class="menu-btn" style="margin-top: 20px; background: #fff; color: #000;" onclick="submitTask()">[ ЗАНЕСТИ В АРХИВ ]</button>
    </div>

    <div id="viewTasksScreen" class="frame hidden">
        <div class="header-title">INVESTIGATIONS</div>
        <div id="taskListContent"></div>
    </div>

    <div id="statsScreen" class="frame hidden">
        <div class="header-title">VITALS & SKILLS</div>
        <div class="title-block" id="titleBlockContainer" style="display: none;">
            <div class="title-label">Ваш текущий профиль:</div>
            <div class="title-name" id="playerTitle">АНАЛИЗ...</div>
            <button class="menu-btn small-btn" onclick="openCodex()">[ РАСШИФРОВАТЬ ГЕНОМ ]</button>
        </div>
        <div id="statsListContent"></div>
    </div>

    <div id="codexScreen" class="frame hidden">
        <div class="header-title">GENOME CODEX</div>
        <div id="codexContent"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const AUTH_WEBHOOK_URL = 'https://n8n.nevn8n8amocrm.online/webhook/b0607fcb-775f-466e-8f2d-cc3b81fb632e'; 
        const N8N_CREATE_TASK_URL = 'https://n8n.nevn8n8amocrm.online/webhook/ba753654-0bcf-44b6-bd2f-299a6a5b389f';
        const N8N_GET_TASKS_URL = 'https://n8n.nevn8n8amocrm.online/webhook/stamina-get-tasks';
        const N8N_COMPLETE_TASK_URL = 'https://n8n.nevn8n8amocrm.online/webhook/stamina-complete-task';
        const N8N_GET_STATS_URL = 'https://n8n.nevn8n8amocrm.online/webhook/stamina-get-stats';

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('taskDate').value = today;

        let typeWriterTimeout;
        let globalStatsData = []; // Храним стату для Кодекса
        let backTarget = 'mainMenuScreen'; // Куда возвращаться

        // НАСТРОЙКА КНОПКИ НАЗАД ДЛЯ МНОГОУРОВНЕВОСТИ
        tg.BackButton.onClick(() => {
            if(backTarget === 'statsScreen') loadStats();
            else openScreen(backTarget);
        });

        function lisaSpeak(text) {
            const bubble = document.getElementById('lisaBubble');
            bubble.classList.remove('hidden');
            bubble.innerText = '';
            clearTimeout(typeWriterTimeout);
            let i = 0;
            function typeWriter() {
                if (i < text.length) {
                    bubble.innerHTML += text.charAt(i);
                    i++;
                    typeWriterTimeout = setTimeout(typeWriter, 30);
                }
            }
            typeWriter();
        }

        function toggleSound() {
            const audio = document.getElementById('bgMusic');
            audio.muted = !audio.muted;
            document.getElementById('soundToggleBtn').innerText = audio.muted ? '[ ♪ OFF ]' : '[ ♪ ON ]';
        }

        async function authenticate() {
            const audio = document.getElementById('bgMusic');
            audio.play().catch(e => {});
            const statusText = document.getElementById('loaderStatus');
            statusText.innerText = "СВЕРКА ПЕЧАТЕЙ...";

            let tgId = tg.initDataUnsafe?.user?.id || 1211686949; 

            try {
                const response = await fetch(AUTH_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tg_id: tgId })
                });
                const data = await response.json();
                if (response.ok && data.status === 'ok') {
                    document.getElementById('userName').innerText = data.name || "Семпай";
                    openScreen('mainMenuScreen');
                    document.getElementById('soundToggleBtn').classList.remove('hidden');
                    setTimeout(() => lisaSpeak(`Рада видеть вас живым, ${data.name || "Семпай"}.`), 500);
                } else {
                    openScreen('accessDeniedScreen');
                }
            } catch (e) { statusText.innerText = "[ ОШИБКА СЕРВЕРА ]"; }
        }

        function openScreen(screenId, target = 'mainMenuScreen') {
            backTarget = target;
            document.querySelectorAll('.frame').forEach(el => el.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            document.getElementById('lisaBubble').classList.add('hidden');
            
            if (screenId !== 'mainMenuScreen') tg.BackButton.show();
            else tg.BackButton.hide();

            if (screenId === 'createTaskScreen' && tg.initDataUnsafe?.user) {
                tg.MainButton.setText("ЗАНЕСТИ В АРХИВ");
                tg.MainButton.show();
                tg.MainButton.onClick(submitTask);
            } else {
                tg.MainButton.hide();
            }
        }

        async function submitTask() {
            const payload = {
                task_name: document.getElementById('taskName').value,
                stat_id: document.getElementById('taskStat').value,
                xp: parseInt(document.getElementById('taskXP').value),
                date: document.getElementById('taskDate').value
            };
            if (!payload.task_name) return;
            tg.MainButton.showProgress();
            try {
                await fetch(N8N_CREATE_TASK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                document.getElementById('taskName').value = '';
                openScreen('mainMenuScreen');
                setTimeout(() => lisaSpeak("Инцидент зафиксирован во тьме..."), 500);
            } finally { tg.MainButton.hideProgress(); }
        }

        async function loadTasks() {
            openScreen('viewTasksScreen');
            const container = document.getElementById('taskListContent');
            container.innerHTML = '<p style="text-align:center;" class="blink-text">ЧТЕНИЕ СВИТКОВ...</p>';
            try {
                const response = await fetch(`${N8N_GET_TASKS_URL}?t=${Date.now()}`);
                const rawData = await response.json();
                const tasks = Array.isArray(rawData) ? rawData : (rawData.tasks || []);
                container.innerHTML = tasks.length ? '' : '<p style="text-align:center; padding: 20px;">ИНЦИДЕНТОВ НЕТ. ТИШИНА.</p>';
                tasks.forEach(task => {
                    container.innerHTML += `
                        <div class="task-item" id="task-${task.id}">
                            <div style="flex-grow: 1; padding-right: 10px;">
                                <div class="task-name">${task.name}</div>
                                <div class="task-xp">${task.xp} УГРОЗА</div>
                            </div>
                            <button class="complete-btn" onclick="completeTask('${task.id}', this)">[ ИЗГНАТЬ ]</button>
                        </div>`;
                });
            } catch (e) { container.innerHTML = `<p style="text-align:center; color:red;">[ ОШИБКА СВЯЗИ ]</p>`; }
        }

        async function completeTask(taskId, btn) {
            btn.innerText = '[ ... ]';
            try {
                await fetch(N8N_COMPLETE_TASK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: taskId })
                });
                const el = document.getElementById(`task-${taskId}`);
                if (el) el.remove();
                lisaSpeak("Инцидент исчерпан. Зло отступило.");
            } catch (e) { btn.innerText = '[ ОШИБКА ]'; }
        }

        // БАЗЫ ЗВАНИЙ (ДЛЯ РАСЧЕТОВ)
        const titleTrees = {
            "сила клерка": ["Офисная Жертва", "Младший Детектив", "Архивариус Ужаса", "Куратор Запретного", "Жрец Бюрократии"],
            "здоровье": ["Хрупкий Сосуд", "Выживший в Шиокаве", "Искатель Истины", "Закаленный Мраком", "Бессмертный Упырь"],
            "музыка": ["Слушатель Помех", "Ловец Мертвых Частот", "Композитор Кошмаров", "Дирижер Ритуалов", "Голос Древних"],
            "рисование": ["Маратель Бумаги", "Зарисовщик Теней", "Художник Скверны", "Творец Проклятых Гравюр", "Око Богов"],
            "3д": ["Скульптор Глины", "Исказитель Форм", "Ткач Полигонов", "Архитектор Неевклидова Мира", "Владыка Измерений"],
            "монтаж": ["Смотритель Кассет", "Склейщик Пленок", "Монтажер Снаффа", "Иллюзионист Хроники", "Властелин 25-го Кадра"],
            "mentality": ["Параноик", "Исследователь Аномалий", "Оккультист", "Знаток Некрономикона", "Пробудивший Древних"]
        };
        const comboDict = {
            "mentality+сила клерка": "Безумный Архивариус", "здоровье+сила клерка": "Неутомимый Детектив", "3д+рисование": "Творец Плоти",
            "монтаж+музыка": "Режиссер Радиопомех", "mentality+рисование": "Провидец Апокалипсиса", "mentality+музыка": "Жрец Культа Шепота",
            "3д+монтаж": "Исказитель Реальности", "здоровье+mentality": "Одержимый Выживший", "музыка+сила клерка": "Клерк Мертвых Радиостанций",
            "монтаж+сила клерка": "Цензор Проклятых Кассет", "здоровье+монтаж": "Уцелевший Режиссер", "здоровье+рисование": "Анатом Кошмаров",
            "3д+сила клерка": "Архитектор Кабинетов Зла", "3д+mentality": "Магистр Иных Сфер"
        };
        const tierLevels = [1, 3, 6, 10, 15]; // Уровни для переходов базы

        function calcLvl(xp) {
            let level = 1;
            let req = 100; 
            let acc = 0; 
            while (xp >= acc + req) { acc += req; level++; req += 50; }
            return level;
        }

        async function loadStats() {
            openScreen('statsScreen');
            const container = document.getElementById('statsListContent');
            const titleBlock = document.getElementById('titleBlockContainer');
            
            container.innerHTML = '<p style="text-align:center;" class="blink-text">АНАЛИЗ ДУШИ...</p>';
            titleBlock.style.display = 'none';

            try {
                const response = await fetch(`${N8N_GET_STATS_URL}?t=${Date.now()}`);
                const rawData = await response.json();
                globalStatsData = Array.isArray(rawData) ? rawData : (rawData.stats || []);

                container.innerHTML = '';
                if(globalStatsData.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">Данные о сущности не найдены.</p>';
                    return;
                }

                // РАСЧЕТ ТЕКУЩЕГО ЗВАНИЯ
                const p = globalStatsData[0];
                const s = globalStatsData.length > 1 ? globalStatsData[1] : null;
                const pLvl = calcLvl(p.xp);
                let tier = 0;
                if (pLvl >= 3) tier = 1; if (pLvl >= 6) tier = 2; if (pLvl >= 10) tier = 3; if (pLvl >= 15) tier = 4;
                
                let pName = p.name.toLowerCase().trim();
                let title = titleTrees[pName] ? titleTrees[pName][tier] : "Неизвестная Сущность";

                if (s && p.xp > 0 && s.xp >= p.xp * 0.65) {
                    let sName = s.name.toLowerCase().trim();
                    let comboKey = [pName, sName].sort().join("+");
                    if (comboDict[comboKey]) title = comboDict[comboKey];
                }

                document.getElementById('playerTitle').innerText = `[ ${title} ]`;
                titleBlock.style.display = 'block';

                globalStatsData.forEach(stat => {
                    let level = 1, req = 100, acc = 0;
                    while (stat.xp >= acc + req) { acc += req; level++; req += 50; }
                    let currXp = stat.xp - acc;
                    let percent = (currXp / req) * 100;

                    container.innerHTML += `
                        <div class="stat-container">
                            <div class="stat-header">
                                <span>${stat.name} <span class="stat-level">LVL ${level}</span></span>
                                <span style="font-size: 16px;">${currXp} / ${req} XP</span>
                            </div>
                            <div class="stat-bar-bg">
                                <div class="stat-bar-fill" style="width: ${percent}%;"></div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) { container.innerHTML = `<p style="text-align:center; color:red;">[ СБОЙ БИОМЕТРИИ ]</p>`; }
        }

        // --- ЛОГИКА КОДЕКСА (ЭКРАН РАСШИФРОВКИ) ---
        function openCodex() {
            openScreen('codexScreen', 'statsScreen');
            const container = document.getElementById('codexContent');
            
            if (globalStatsData.length === 0) {
                container.innerHTML = '<p>Нет данных для анализа.</p>'; return;
            }

            const p = globalStatsData[0];
            const s = globalStatsData.length > 1 ? globalStatsData[1] : null;
            const pLvl = calcLvl(p.xp);
            
            let tier = 0;
            if (pLvl >= 3) tier = 1; if (pLvl >= 6) tier = 2; if (pLvl >= 10) tier = 3; if (pLvl >= 15) tier = 4;
            
            const pName = p.name.toLowerCase().trim();
            const basePath = titleTrees[pName] || [];
            
            let isHybrid = false;
            let hybridName = "";
            let sNameRaw = s ? s.name.toLowerCase().trim() : "";
            
            if (s && p.xp > 0 && s.xp >= p.xp * 0.65) {
                let comboKey = [pName, sNameRaw].sort().join("+");
                if (comboDict[comboKey]) {
                    isHybrid = true;
                    hybridName = comboDict[comboKey];
                }
            }

            let html = `
                <div class="codex-section">
                    <div class="codex-h">ДОМИНАНТА РАЗУМА</div>
                    <p class="codex-p">Твой основной вектор развития — <span class="highlight">${p.name}</span> (Уровень ${pLvl}). Это диктует твою первородную форму.</p>
                </div>
            `;

            if (isHybrid) {
                html += `
                <div class="codex-section">
                    <div class="codex-h">МУТАЦИЯ: АКТИВНА</div>
                    <p class="codex-p">Влияние <span class="highlight">${s.name}</span> достаточно велико (более 65% от основы), чтобы запустить синтез. Ваша сущность эволюционировала в гибрид.</p>
                </div>`;
            } else {
                html += `
                <div class="codex-section">
                    <div class="codex-h">МУТАЦИЯ: СПЯЩИЙ ГЕН</div>
                    <p class="codex-p">Ваши второстепенные навыки слишком слабы, чтобы образовать синтез с доминантой.</p>
                </div>`;
            }

            // ПУТЬ БАЗОВОЙ ЭВОЛЮЦИИ
            let nextLevelReq = tier < 4 ? tierLevels[tier + 1] : "MAX";
            let nextTitle = tier < 4 ? basePath[tier + 1] : "АБСОЛЮТ";
            
            html += `
                <div class="codex-section">
                    <div class="codex-h">ВЕКТОР ЭВОЛЮЦИИ</div>
                    <p class="codex-p">Чтобы перейти на следующую ступень базового пути, вам нужен <span class="highlight">УРОВЕНЬ ${nextLevelReq}</span> в навыке <b>${p.name}</b>.</p>
                    <p class="codex-p">Грядущая форма: <b>[ ${nextTitle} ]</b></p>
                </div>
            `;

            // ПУТЬ СИНТЕЗА (ГИБРИДЫ)
            let reqXp = Math.floor(p.xp * 0.65);
            html += `<div class="codex-section"><div class="codex-h">ВЕКТОР СИНТЕЗА</div>`;
            
            if (isHybrid) {
                html += `<p class="codex-p">Чтобы удержать гибридную форму, поддерживайте <b>${s.name}</b> не ниже <span class="highlight">${reqXp} XP</span>. Если Доминанта вырвется далеко вперед, связь распадется.</p>`;
            } else if (s) {
                let xpShort = reqXp - s.xp;
                html += `<p class="codex-p">Ближайший катализатор мутации — <b>${s.name}</b>. Наберите еще <span class="highlight">${xpShort} XP</span> в этой характеристике, чтобы открыть секретный гибридный класс.</p>`;
            }
            html += `</div>`;

            container.innerHTML = html;
        }
    </script>
</body>
</html>
